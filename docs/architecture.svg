<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="600" viewBox="0 0 1180 600" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1180" height="600" fill="#ffffff"/>
  <text x="20" y="34" font-size="20" font-weight="700" fill="#1a2330">AIOps Autopilot — incident-to-resolution loop</text>
  <text x="20" y="56" font-size="13" fill="#5a6472">ingest → triage/root-cause → plan → HITL gate → execute → verify → (auto-rollback) → record · benchmarked vs a single-prompt baseline</text>

  <!-- arrow marker -->
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#5a6472"/>
    </marker>
    <marker id="arrd" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 z" fill="#b0451a"/>
    </marker>
  </defs>

  <!-- fault harness -->
  <rect x="20" y="92" width="150" height="48" rx="8" fill="#fdeaf2" stroke="#c0567f"/>
  <text x="95" y="112" font-size="12" font-weight="700" fill="#8a2c54" text-anchor="middle">Fault harness</text>
  <text x="95" y="128" font-size="10.5" fill="#8a2c54" text-anchor="middle">injects known faults (ground truth)</text>

  <!-- stage boxes row (y=170) -->
  <!-- 1 ingest -->
  <rect x="20" y="170" width="150" height="74" rx="8" fill="#eef3fb" stroke="#5b82c2"/>
  <text x="95" y="194" font-size="12.5" font-weight="700" fill="#22456f" text-anchor="middle">1 · Ingest</text>
  <text x="95" y="212" font-size="10.5" fill="#22456f" text-anchor="middle">raw capture →</text>
  <text x="95" y="226" font-size="10.5" fill="#22456f" text-anchor="middle">typed Incident</text>

  <!-- 2-3 triage -->
  <rect x="195" y="170" width="160" height="74" rx="8" fill="#e7f0ff" stroke="#3f6fc0"/>
  <text x="275" y="190" font-size="12.5" font-weight="700" fill="#1f4585" text-anchor="middle">2–3 · Triage / Root cause</text>
  <text x="275" y="207" font-size="10.5" fill="#1f4585" text-anchor="middle">qwen3.7-max · scoped tools</text>
  <text x="275" y="221" font-size="10.5" fill="#1f4585" text-anchor="middle">(telemetry + knowledge)</text>
  <text x="275" y="235" font-size="10" fill="#516">ranked hypotheses + evidence</text>

  <!-- 4 planner -->
  <rect x="380" y="170" width="150" height="74" rx="8" fill="#e7f0ff" stroke="#3f6fc0"/>
  <text x="455" y="190" font-size="12.5" font-weight="700" fill="#1f4585" text-anchor="middle">4 · Planner</text>
  <text x="455" y="207" font-size="10.5" fill="#1f4585" text-anchor="middle">qwen3.7-max · NO tools</text>
  <text x="455" y="221" font-size="10.5" fill="#1f4585" text-anchor="middle">act-or-escalate,</text>
  <text x="455" y="235" font-size="10.5" fill="#1f4585" text-anchor="middle">risk-scored proposal</text>

  <!-- 5 gate (diamond-ish) -->
  <rect x="555" y="166" width="150" height="82" rx="8" fill="#fff5da" stroke="#c79a17"/>
  <text x="630" y="188" font-size="12.5" font-weight="700" fill="#7a5e07" text-anchor="middle">5 · HITL gate</text>
  <text x="630" y="205" font-size="10.5" fill="#7a5e07" text-anchor="middle">auto iff conf≥0.75</text>
  <text x="630" y="219" font-size="10.5" fill="#7a5e07" text-anchor="middle">∧ risk≤0.4</text>
  <text x="630" y="235" font-size="10.5" fill="#7a5e07" text-anchor="middle">destructive → human</text>

  <!-- 6 executor -->
  <rect x="730" y="170" width="150" height="74" rx="8" fill="#eaf7ee" stroke="#3f9a5c"/>
  <text x="805" y="190" font-size="12.5" font-weight="700" fill="#1f6638" text-anchor="middle">6 · Executor</text>
  <text x="805" y="207" font-size="10.5" fill="#1f6638" text-anchor="middle">infra tools ONLY</text>
  <text x="805" y="221" font-size="10.5" fill="#1f6638" text-anchor="middle">dry-run → apply,</text>
  <text x="805" y="235" font-size="10.5" fill="#1f6638" text-anchor="middle">halt on failure</text>

  <!-- 7 verifier -->
  <rect x="905" y="170" width="150" height="74" rx="8" fill="#eaf7ee" stroke="#3f9a5c"/>
  <text x="980" y="190" font-size="12.5" font-weight="700" fill="#1f6638" text-anchor="middle">7 · Verifier</text>
  <text x="980" y="207" font-size="10.5" fill="#1f6638" text-anchor="middle">telemetry only,</text>
  <text x="980" y="221" font-size="10.5" fill="#1f6638" text-anchor="middle">backlog-aware</text>

  <!-- arrows along the row -->
  <line x1="95"  y1="140" x2="95"  y2="168" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="170" y1="207" x2="193" y2="207" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="355" y1="207" x2="378" y2="207" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="530" y1="207" x2="553" y2="207" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="705" y1="207" x2="728" y2="207" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="716" y="200" font-size="9.5" fill="#7a5e07" text-anchor="middle">approve</text>
  <line x1="880" y1="207" x2="903" y2="207" stroke="#5a6472" marker-end="url(#arr)"/>

  <!-- human branch from gate -->
  <rect x="555" y="300" width="150" height="48" rx="8" fill="#fdeaf2" stroke="#c0567f"/>
  <text x="630" y="320" font-size="12" font-weight="700" fill="#8a2c54" text-anchor="middle">Human operator</text>
  <text x="630" y="336" font-size="10.5" fill="#8a2c54" text-anchor="middle">Approver protocol</text>
  <line x1="630" y1="248" x2="630" y2="298" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="700" y="278" font-size="9.5" fill="#8a2c54" text-anchor="middle">escalate / destructive</text>
  <!-- human approve back to executor -->
  <path d="M705,318 L805,318 L805,246" fill="none" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="770" y="312" font-size="9.5" fill="#1f6638" text-anchor="middle">approve / edit</text>
  <!-- reject -> safe escalation -->
  <rect x="380" y="300" width="150" height="48" rx="8" fill="#f1f3f6" stroke="#9aa4b2"/>
  <text x="455" y="320" font-size="11.5" font-weight="700" fill="#3b4654" text-anchor="middle">Safe escalation</text>
  <text x="455" y="336" font-size="10.5" fill="#3b4654" text-anchor="middle">sandbox untouched</text>
  <line x1="555" y1="324" x2="532" y2="324" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="543" y="316" font-size="9.5" fill="#8a2c54" text-anchor="middle">reject</text>

  <!-- outcome + rollback -->
  <rect x="905" y="300" width="150" height="48" rx="8" fill="#eef3fb" stroke="#5b82c2"/>
  <text x="980" y="320" font-size="11.5" font-weight="700" fill="#22456f" text-anchor="middle">8 · record_outcome</text>
  <text x="980" y="336" font-size="10.5" fill="#22456f" text-anchor="middle">knowledge store</text>
  <line x1="980" y1="244" x2="980" y2="298" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="1028" y="276" font-size="9.5" fill="#1f6638" text-anchor="middle">resolved</text>

  <rect x="730" y="300" width="150" height="48" rx="8" fill="#fbeee7" stroke="#c0703f"/>
  <text x="805" y="320" font-size="11.5" font-weight="700" fill="#8a4a1f" text-anchor="middle">Auto-rollback</text>
  <text x="805" y="336" font-size="10.5" fill="#8a4a1f" text-anchor="middle">damage containment</text>
  <path d="M905,228 L892,228 L892,300" fill="none" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="868" y="276" font-size="9.5" fill="#8a4a1f" text-anchor="middle">not resolved</text>
  <line x1="880" y1="324" x2="903" y2="324" stroke="#5a6472" marker-end="url(#arr)"/>

  <!-- sandbox box -->
  <rect x="20" y="410" width="1035" height="120" rx="10" fill="#f7f9fc" stroke="#5b82c2" stroke-dasharray="6 4"/>
  <text x="38" y="434" font-size="13" font-weight="700" fill="#22456f">Sandbox (docker-compose) — the ONLY infrastructure the executor may touch</text>
  <text x="38" y="452" font-size="10.5" fill="#5a6472">targets are a closed enum injected/validated server-side · benchmark: 0 invalid (out-of-sandbox) tool calls · deployed backend mounts no Docker socket</text>
  <g font-size="11.5" font-weight="700" text-anchor="middle">
    <rect x="60"  y="470" width="150" height="44" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="135" y="497" fill="#22456f">app</text>
    <rect x="240" y="470" width="150" height="44" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="315" y="497" fill="#22456f">worker</text>
    <rect x="420" y="470" width="150" height="44" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="495" y="497" fill="#22456f">downstream</text>
    <rect x="600" y="470" width="150" height="44" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="675" y="497" fill="#22456f">db</text>
    <rect x="780" y="470" width="150" height="44" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="855" y="497" fill="#22456f">queue</text>
  </g>

  <!-- observe / mutate arrows to sandbox -->
  <line x1="275" y1="244" x2="275" y2="408" stroke="#5a6472" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="290" y="392" font-size="9.5" fill="#5a6472" text-anchor="start">observe</text>
  <line x1="805" y1="348" x2="805" y2="408" stroke="#b0451a" stroke-dasharray="4 3" marker-end="url(#arrd)"/>
  <text x="822" y="392" font-size="9.5" fill="#b0451a" text-anchor="start">mutate (sandbox-only)</text>
  <line x1="1000" y1="348" x2="1000" y2="408" stroke="#5a6472" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="1015" y="392" font-size="9.5" fill="#5a6472" text-anchor="start">verify</text>

  <text x="20" y="565" font-size="10.5" fill="#8a8f99">Reasoning tier (qwen3.7-max): triage + planner. Default tier (qwen3.7-plus): configured, currently uncalled by the live pipeline. Static export of docs/architecture.md.</text>
</svg>
