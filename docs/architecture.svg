<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="540" viewBox="0 0 1180 540" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1180" height="540" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6.5,3 L0,6 z" fill="#5a6472"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="8" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L6.5,3 L0,6 z" fill="#b0451a"/>
    </marker>
  </defs>

  <text x="20" y="26" font-size="19" font-weight="700" fill="#1a2330">AIOps Autopilot: incident-to-resolution pipeline</text>

  <!-- rollback feedback arc (verifier -> executor, above the row) -->
  <path d="M1089,90 C1089,52 933,52 933,90" fill="none" stroke="#c0703f" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="1011" y="48" font-size="10.5" fill="#8a4a1f" text-anchor="middle">auto-rollback if unresolved</text>

  <!-- fault harness -->
  <rect x="20" y="92" width="150" height="64" rx="8" fill="#fdeaf2" stroke="#c0567f"/>
  <text x="95" y="118" font-size="12" font-weight="700" fill="#8a2c54" text-anchor="middle">Fault harness</text>
  <text x="95" y="135" font-size="9.5" fill="#8a2c54" text-anchor="middle">injects known faults</text>
  <text x="95" y="149" font-size="9.5" fill="#8a2c54" text-anchor="middle">(ground truth)</text>

  <!-- ===== top pipeline row (y=92..162) ===== -->
  <!-- 1 ingest -->
  <rect x="190" y="92" width="138" height="64" rx="8" fill="#eef3fb" stroke="#5b82c2"/>
  <text x="259" y="118" font-size="12" font-weight="700" fill="#22456f" text-anchor="middle">1 · Ingest</text>
  <text x="259" y="135" font-size="9.5" fill="#22456f" text-anchor="middle">raw capture →</text>
  <text x="259" y="149" font-size="9.5" fill="#22456f" text-anchor="middle">typed Incident</text>

  <!-- 2-3 root cause -->
  <rect x="348" y="92" width="150" height="64" rx="8" fill="#e7f0ff" stroke="#3f6fc0"/>
  <text x="423" y="116" font-size="12" font-weight="700" fill="#1f4585" text-anchor="middle">2-3 · Root cause</text>
  <text x="423" y="132" font-size="9.5" fill="#1f4585" text-anchor="middle">qwen3.7-max</text>
  <text x="423" y="146" font-size="9.5" fill="#1f4585" text-anchor="middle">telemetry + knowledge</text>

  <!-- 4 planner -->
  <rect x="518" y="92" width="150" height="64" rx="8" fill="#e7f0ff" stroke="#3f6fc0"/>
  <text x="593" y="116" font-size="12" font-weight="700" fill="#1f4585" text-anchor="middle">4 · Planner</text>
  <text x="593" y="132" font-size="9.5" fill="#1f4585" text-anchor="middle">qwen3.7-max · no tools</text>
  <text x="593" y="146" font-size="9.5" fill="#1f4585" text-anchor="middle">risk-scored plan</text>

  <!-- 5 gate -->
  <rect x="688" y="92" width="150" height="64" rx="8" fill="#fff5da" stroke="#c79a17"/>
  <text x="763" y="116" font-size="12" font-weight="700" fill="#7a5e07" text-anchor="middle">5 · HITL gate</text>
  <text x="763" y="132" font-size="9.5" fill="#7a5e07" text-anchor="middle">auto iff conf≥.75</text>
  <text x="763" y="146" font-size="9.5" fill="#7a5e07" text-anchor="middle">∧ risk≤.4</text>

  <!-- 6 executor -->
  <rect x="858" y="92" width="150" height="64" rx="8" fill="#eaf7ee" stroke="#3f9a5c"/>
  <text x="933" y="116" font-size="12" font-weight="700" fill="#1f6638" text-anchor="middle">6 · Executor</text>
  <text x="933" y="132" font-size="9.5" fill="#1f6638" text-anchor="middle">infra tools only</text>
  <text x="933" y="146" font-size="9.5" fill="#1f6638" text-anchor="middle">dry-run → apply</text>

  <!-- 7 verifier -->
  <rect x="1018" y="92" width="142" height="64" rx="8" fill="#eaf7ee" stroke="#3f9a5c"/>
  <text x="1089" y="116" font-size="12" font-weight="700" fill="#1f6638" text-anchor="middle">7 · Verifier</text>
  <text x="1089" y="132" font-size="9.5" fill="#1f6638" text-anchor="middle">telemetry only</text>
  <text x="1089" y="146" font-size="9.5" fill="#1f6638" text-anchor="middle">re-check health</text>

  <!-- main flow arrows -->
  <line x1="170" y1="124" x2="188" y2="124" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="328" y1="124" x2="346" y2="124" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="498" y1="124" x2="516" y2="124" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="668" y1="124" x2="686" y2="124" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="838" y1="124" x2="856" y2="124" stroke="#5a6472" marker-end="url(#arr)"/>
  <line x1="1008" y1="124" x2="1016" y2="124" stroke="#5a6472" marker-end="url(#arr)"/>

  <!-- ===== HITL branch (below the gate) ===== -->
  <!-- 8 record outcome -->
  <rect x="1018" y="250" width="142" height="54" rx="8" fill="#eef3fb" stroke="#5b82c2"/>
  <text x="1089" y="273" font-size="11.5" font-weight="700" fill="#22456f" text-anchor="middle">8 · Record outcome</text>
  <text x="1089" y="290" font-size="9.5" fill="#22456f" text-anchor="middle">→ knowledge store</text>
  <line x1="1089" y1="156" x2="1089" y2="248" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="1099" y="206" font-size="9.5" fill="#1f6638" text-anchor="start">resolved</text>

  <!-- human operator -->
  <rect x="688" y="250" width="150" height="54" rx="8" fill="#fdeaf2" stroke="#c0567f"/>
  <text x="763" y="273" font-size="12" font-weight="700" fill="#8a2c54" text-anchor="middle">Human operator</text>
  <text x="763" y="290" font-size="9.5" fill="#8a2c54" text-anchor="middle">Approver protocol</text>
  <line x1="763" y1="156" x2="763" y2="248" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="772" y="206" font-size="9.5" fill="#8a2c54" text-anchor="start">escalate</text>

  <!-- safe escalation -->
  <rect x="468" y="250" width="150" height="54" rx="8" fill="#f1f3f6" stroke="#9aa4b2"/>
  <text x="543" y="273" font-size="11.5" font-weight="700" fill="#3b4654" text-anchor="middle">Safe escalation</text>
  <text x="543" y="290" font-size="9.5" fill="#3b4654" text-anchor="middle">sandbox untouched</text>
  <line x1="688" y1="277" x2="620" y2="277" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="654" y="270" font-size="9.5" fill="#8a2c54" text-anchor="middle">reject</text>

  <!-- human approve -> executor -->
  <path d="M838,268 L900,268 L900,158" fill="none" stroke="#5a6472" marker-end="url(#arr)"/>
  <text x="845" y="262" font-size="9.5" fill="#1f6638" text-anchor="start">approve / edit</text>

  <!-- ===== sandbox panel ===== -->
  <line x1="933" y1="156" x2="933" y2="386" stroke="#b0451a" stroke-dasharray="5 3" marker-end="url(#arrRed)"/>
  <text x="942" y="350" font-size="10" fill="#b0451a" text-anchor="start">mutate (sandbox-only)</text>
  <line x1="259" y1="386" x2="259" y2="158" stroke="#5a6472" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="150" y="350" font-size="10" fill="#5a6472" text-anchor="start">observe (telemetry)</text>

  <rect x="20" y="388" width="1140" height="120" rx="10" fill="#f7f9fc" stroke="#5b82c2" stroke-dasharray="6 4"/>
  <text x="38" y="412" font-size="13" font-weight="700" fill="#22456f">Sandbox (docker-compose): the ONLY infrastructure the executor may touch</text>
  <text x="38" y="430" font-size="10.5" fill="#5a6472">Action targets are a closed enum, injected &amp; validated server-side → benchmark: 0 invalid (out-of-sandbox) tool calls</text>
  <g font-size="12" font-weight="700" text-anchor="middle">
    <rect x="100" y="446" width="178" height="46" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="189" y="474" fill="#22456f">app</text>
    <rect x="298" y="446" width="178" height="46" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="387" y="474" fill="#22456f">worker</text>
    <rect x="496" y="446" width="178" height="46" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="585" y="474" fill="#22456f">downstream</text>
    <rect x="694" y="446" width="178" height="46" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="783" y="474" fill="#22456f">db</text>
    <rect x="892" y="446" width="178" height="46" rx="8" fill="#eef3fb" stroke="#5b82c2"/><text x="981" y="474" fill="#22456f">queue</text>
  </g>

  <text x="20" y="528" font-size="10" fill="#8a8f99">Reasoning tier (qwen3.7-max): triage + planner. Default tier (qwen3.7-plus): configured, currently uncalled by the live pipeline.</text>
</svg>
